<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header>
      <div class="logo-area">
        <img src="./assets/weather-app.svg" id="logo" alt="Odin Weather Logo">
        <h1>Odin Weather</h1>
      </div>
      <div class="header-center">
        <div class="search-bar">
          <input type="text" id="search" name="search" placeholder="Enter a City..." />
        </div>
        <div class="unit-toggle">
          <input type="radio" id="celsius" name="unit" value="metric" checked>
          <label for="celsius">°C</label>
          <input type="radio" id="fahrenheit" name="unit" value="us">
          <label for="fahrenheit">°F</label>
          <div class="toggle-glider"></div>
        </div>
      </div>
    </header>
    <main>
      <div id="weather"></div>
      <div id="humidity"></div>
      <div id="wind"></div>
      <div id="rain"></div>
    </main>
    <footer>
      <div class="footer">Made by OdinM13</div>
    </footer>
  </body>
</html>
